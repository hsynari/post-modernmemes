<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>POSTMODERNMEMEler 🏗️</title>

<!-- Firebase 8 compat -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#f0ebe0;
  --ink:#111;
  --red:#cc0033;
  --syne:'Syne',sans-serif;
  --mono:'Courier Prime',monospace;
  --border:2.5px solid #111;
  --sh:5px 5px 0 #111;
  --sh-sm:3px 3px 0 #111;
}

body{
  background:var(--bg);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 39px,#d4cfc4 39px,#d4cfc4 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,#d4cfc4 39px,#d4cfc4 40px);
  font-family:var(--mono);
  min-height:100dvh;
  color:var(--ink);
}

#app{
  max-width:480px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 16px 40px;
  gap:18px;
}
@media(min-width:768px){
  #app{max-width:960px;padding:28px 32px 48px}
  .hand{flex-direction:row!important;align-items:stretch}
  .hand .white-card{flex:1 1 0;min-width:0}
  .black-card{max-width:420px;align-self:center}
  .scores{justify-content:center}
  .result-banner{max-width:500px;align-self:center}
}

/* ── LOGO ── */
.logo{
  font-family:var(--syne);
  font-size:36px;
  font-weight:800;
  letter-spacing:-2px;
  line-height:0.9;
  text-align:center;
}
.logo span{color:var(--red)}
.tagline{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#888;text-align:center}

/* ── PANEL ── */
.panel{
  width:100%;
  background:#fff;
  border:var(--border);
  box-shadow:var(--sh);
  border-radius:4px;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ── INPUTS ── */
.inp{
  width:100%;
  font-family:var(--mono);
  font-size:15px;
  padding:12px 14px;
  border:var(--border);
  background:var(--bg);
  border-radius:3px;
  outline:none;
}
.inp:focus{outline:2px solid var(--red);outline-offset:2px}
.code-inp{
  text-transform:uppercase;
  letter-spacing:8px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  font-family:var(--syne);
}

/* ── BUTTONS ── */
.btn{
  font-family:var(--syne);
  font-weight:800;
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:13px 24px;
  border:var(--border);
  box-shadow:var(--sh);
  border-radius:3px;
  cursor:pointer;
  transition:transform .1s,box-shadow .1s;
  width:100%;
}
.btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 #111}
.btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:6px 6px 0 #111}
.btn:disabled{background:#ccc!important;cursor:not-allowed;color:#888;box-shadow:none;transform:none}
.btn.red{background:var(--red);color:#fff}
.btn.dark{background:var(--ink);color:var(--bg)}
.btn.sm{font-size:11px;padding:8px 16px;width:auto;align-self:center}

.or{text-align:center;font-size:12px;color:#aaa;letter-spacing:2px}
.err{color:var(--red);font-size:12px;min-height:16px;text-align:center}
.foot{font-size:10px;letter-spacing:2px;color:#aaa;text-align:center}

/* ── CODE BOX ── */
.code-box{
  width:100%;
  border:3px solid var(--ink);
  box-shadow:var(--sh);
  border-radius:4px;
  padding:20px;
  text-align:center;
  background:#fff;
}
.code-lbl{font-family:var(--syne);font-size:10px;font-weight:700;letter-spacing:4px;color:#888;text-transform:uppercase}
.code-val{
  font-family:var(--syne);
  font-size:52px;
  font-weight:800;
  letter-spacing:6px;
  color:var(--red);
  line-height:1.1;
}
.code-hint{font-size:11px;color:#aaa;letter-spacing:1px;margin-top:4px}

/* ── PLAYER ROWS ── */
.player-row{display:flex;align-items:center;gap:10px;font-size:14px;padding:6px 0;border-bottom:1px solid #eee}
.player-row:last-child{border-bottom:none}
.player-row.me{font-weight:700}
.dot{width:10px;height:10px;border-radius:50%;background:#ccc;border:1.5px solid #888;flex-shrink:0}
.dot.mine{background:var(--red);border-color:var(--red)}
.me-tag{font-size:11px;color:#888;margin-left:auto}
.pts{margin-left:auto;font-weight:700;font-family:var(--syne)}

/* ── SECTION LABEL ── */
.sec-lbl{
  font-family:var(--syne);
  font-size:10px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  color:#888;
  width:100%;
}

/* ── GAME HEADER ── */
.hdr{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:var(--border);
  padding-bottom:10px;
}
.round-tag{
  font-family:var(--syne);
  font-size:11px;
  font-weight:800;
  letter-spacing:3px;
  background:var(--ink);
  color:var(--bg);
  padding:4px 10px;
  border-radius:2px;
}
.czar-tag{font-size:12px;font-weight:700;letter-spacing:1px}

/* ── BLACK CARD ── */
.black-card{
  width:100%;
  border-radius:6px;
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border:var(--border);
  box-shadow:var(--sh);
  color:#f0ebe0;
}
.bc-year{font-family:var(--syne);font-size:10px;font-weight:700;letter-spacing:4px;opacity:0.5}
.bc-emoji{font-size:36px;line-height:1}
.bc-title{font-family:var(--syne);font-size:22px;font-weight:800;line-height:1.1}
.bc-prompt{font-size:13px;line-height:1.7;opacity:0.85}
/* Siyah kart — görsel versiyonu */
.black-card.img-prompt{
  padding:10px;
  gap:8px;
}
.bc-img-frame{
  width:100%;
  overflow:hidden;
  clip-path:polygon(10px 0%,calc(100% - 10px) 0%,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0% calc(100% - 10px),0% 10px);
}
.bc-img{
  width:100%;
  height:auto;
  display:block;
}
.bc-label{
  font-family:var(--syne);
  font-size:11px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0.6;
  text-align:center;
  padding:4px 0 2px;
}

/* ── WHITE CARDS ── */
.hand{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.white-card{
  width:100%;
  border-radius:5px;
  padding:16px;
  border:var(--border);
  box-shadow:var(--sh-sm);
  display:flex;
  flex-direction:column;
  gap:6px;
  transition:transform .15s,box-shadow .15s;
  position:relative;
}
.white-card.clickable{cursor:pointer}
.white-card.clickable:hover{transform:translateY(-4px) rotate(-0.5deg);box-shadow:var(--sh)}
.white-card.clickable:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #111}
.c-emoji{font-size:26px;line-height:1}
.c-name{font-family:var(--syne);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.c-text{font-size:13px;line-height:1.6;font-style:italic}
.c-img{
  width:100%;
  display:block;
  /* inner radius = outer(8px) - frame(5px) ≈ 3px */
  border-radius:3px;
}
/* Dış çerçeve sarmalayıcı */
.img-frame{
  position:relative;
  display:block;
  /* outer shape: 8px pah */
  clip-path:polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
  /* çerçeve = koyu bg + 5px padding */
  background:#111;
  padding:5px;
  /* drop-shadow çift katman → çerçeve hissi + gölge */
  filter:
    drop-shadow(0 0 1px #111)
    drop-shadow(0 0 1px #111)
    drop-shadow(5px 5px 0 #111);
  transition:filter .15s, transform .15s;
}
.img-frame:hover{
  filter:
    drop-shadow(0 0 1px #111)
    drop-shadow(0 0 1px #111)
    drop-shadow(7px 7px 0 #111);
}
.white-card.has-img{
  padding:0;
  border:none;
  box-shadow:none;
  background:transparent!important;
  overflow:visible;
}
.white-card.has-img.clickable:active .img-frame{
  transform:translate(2px,2px);
  filter:drop-shadow(1px 1px 0 #111);
}
.white-card.has-img .c-name,
.white-card.has-img .c-text,
.white-card.has-img .pick-hint{ display:none }
.pick-hint{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-family:var(--syne);font-size:11px;font-weight:700;
  color:var(--red);letter-spacing:2px;
}

/* ── SCORES ── */
.scores{
  width:100%;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
}
.score-chip{
  border:var(--border);
  border-radius:4px;
  padding:8px 10px;
  text-align:center;
  min-width:70px;
  background:#fff;
  position:relative;
}
.score-chip.me{background:#fff5cc}
.score-chip.czar{border-color:var(--red);box-shadow:2px 2px 0 var(--red)}
.sc-name{font-size:10px;letter-spacing:1px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-pts{font-family:var(--syne);font-size:22px;font-weight:800;line-height:1}
.sc-czar{position:absolute;top:-8px;right:-8px;font-size:14px}

/* ── PROGRESS ── */
.prog{width:100%;height:6px;background:#ddd;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--red);border-radius:3px;transition:width .3s}

/* ── MISC ── */
.wait-msg{font-size:13px;color:#666;text-align:center;line-height:1.7}
.result-banner{
  font-family:var(--syne);
  font-size:28px;
  font-weight:800;
  text-align:center;
  color:var(--red);
  border:3px solid var(--red);
  box-shadow:5px 5px 0 var(--red);
  border-radius:4px;
  padding:16px;
  width:100%;
}
.emoji-row{display:flex;gap:12px;justify-content:center;font-size:32px;padding:12px 0}
.played-tag{
  font-family:var(--syne);
  font-size:10px;
  font-weight:700;
  letter-spacing:2px;
  color:#fff;
  background:#006633;
  padding:3px 8px;
  border-radius:2px;
  align-self:flex-start;
}
</style>
</head>

<div id="app"></div>

<script>

// ════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════
const BLACK_CARDS = [

      { id:"b8r4", text:"En az inşa edilmiş bağlamda en teorik mimari iddiayı ortaya atarak bağlamın sadece fiziksel değil zihinsel bir yapı olduğunu gösteriyor.", color:"#eef0f5", accent:"#556" },
      { id:"b8r5", text:"Mağaranın doğal barınak tipolojisinin sanatsal ve teorik alan olarak yeniden tanımlanması yoluyla yıkılması.", color:"#f5eeff", accent:"#557" },
      { id:"b8r6", text:"Bu adamın postmodernist olma iddiası, o gergedan çiziminin gergedan değil bir gergedanın simülasyonu olduğunu iddia etmesinden kaynaklanıyor. Mağara sanatında bile teori şart.", color:"#fff0ee", accent:"#855" },

      { id:"b9r1", text:"«Less is more» felsefesinin sınırlarında gezinirken, tasarımın tamamen hiçliğe dönüşme tehlikesiyle karşı karşıya kaldığı o ironik eşik.", color:"#f5f5f0", accent:"#555" },
      { id:"b9r2", text:"Aşırı teorileştirme ve akademik jargon çabasının, bazen sadece kötü veya eksik bir tasarımı örtbas etmek için kullanılmasının mükemmel bir özeti.", color:"#fff5e8", accent:"#888" },

      { id:"b9r4", text:"Mimari manifestoların ve -izmlerin karmaşasında kaybolup, dümdüz bir duvarı aşırı entelektüél bir analiz nesnesine dönüştürme takıntısı.", color:"#f5f0ee", accent:"#855" },
      { id:"b9r5", text:"Yapısal gerçekliğin ve ironinin birbirine girdiği noktada, geriye sadece anlaşılmaz bir kavramsal boşluk kalması durumu.", color:"#eef5f0", accent:"#558" },
      { id:"b9r6", text:"Mimarlık jürisinde paftandaki devasa beyaz boşluğu neorealist bir yaklaşım benimsedim diye yutturmaya çalıştığında hocalarının aklından geçen tam olarak budur.", color:"#fff0f5", accent:"#558" },

  { id:"b10",
    img:"https://hsynari.github.io/post-modernmemes/images/1%20(12).png",

    responses:[
      { id:"b10r1", text:"Postmodernizmin klasik «organik bütünlük» algısını reddedip, parçalanmışlığı (fragmentation) ve kolaj estetiğini yüceltmesinin ironik bir okuması.", color:"#f5f5f0", accent:"#555" },
      { id:"b10r2", text:"Binanın cephesinin yapısal sistemden koparılarak bağımsız birer gösterge panosuna (billboard) dönüşmesi fikrinin doğrudan insan silüetine uyarlanması.", color:"#fff5e8", accent:"#888" },
      { id:"b10r3", text:"Farklı bağlamlardan koparılmış mimari elemanların bir araya getirilmesiyle oluşan «pastiş» kavramının gerçek dünyadaki pratik işlevsizliğine dair bir eleştiri.", color:"#f0f0f5", accent:"#556" },
      { id:"b10r4", text:"Mimari sözdiziminin bozulması: Pencere, çatı veya kolon gibi öğelerin geleneksel konumlarından koparılıp rastgele havada asılı bırakılması tutkusu.", color:"#eef5f0", accent:"#558" },

      { id:"b11r4", text:"Yüksek mimari teorinin akademik jargondan çıkıp sıradan insanın günlük diline sızarak o meşhur «çift kodlama» sınırlarını zorlaması.", color:"#eef5f0", accent:"#558" },
      { id:"b11r5", text:"Mimaride tekil ve mutlak bir anlamın kalmadığı, bir yapının kimliğinin tamamen kopuk referansların anlamsız bir yığılımı (assemblage) olduğu yönündeki eleştirel kabul.", color:"#f5eeff", accent:"#557" },
      { id:"b11r6", text:"Konsept bulamayıp Pinterest'ten kestiği alakasız detayları paftaya dizen öğrencinin «yapı kendi bağlamıyla fragmante bir ilişki kuruyor» dediği cuma akşamı muhabbet.", color:"#fff0ee", accent:"#855" },
    ] },
  { id:"b12",
    img:"https://hsynari.github.io/post-modernmemes/images/1%20(14).png",

    responses:[
      { id:"b12r1", text:"Postmodernizmin «biçim işlevden bağımsızdır» tutumunun, hayati önem taşıyan medikal bir cihaza uygulanmasındaki yapısal ve işlevsel absürtlük.", color:"#f5f5f0", accent:"#555" },

      { id:"b12r5", text:"Saf pragmatizm gerektiren bir aracın «ikonik tasarım nesnesi» kaygısıyla süslenmesinin, mimari pratiğin insan gerçekliğinden ne kadar kopabileceğini kanıtlaması.", color:"#f5eeff", accent:"#557" },
      { id:"b12r6", text:"Adamın kalbi durmuş yatıyor olabilir ama defibrilatör muhtemelen pastel tonlarda, kolları minik İyonik sütunlar şeklinde ve tam şarjda kuş sesi çıkararak ötüyor.", color:"#fff0ee", accent:"#855" },
    ] },
  { id:"b13",
    img:"https://hsynari.github.io/post-modernmemes/images/1%20(1).png",
    year:"", title:"Dekore Edilmiş Barınak",

const MY_ID = (() => {
  let id = sessionStorage.getItem('pm_id');
  if (!id) { id = Math.random().toString(36).substr(2, 9); sessionStorage.setItem('pm_id', id); }
  return id;
})();

// ════════════════════════════════════════════════════════════
let myName = sessionStorage.getItem('pm_name') || '';
let roomCode = sessionStorage.getItem('pm_room') || '';
let room = null;
let roomRef = null;

// ════════════════════════════════════════════════════════════
//  YARDIMCI FONKSİYONLAR
// ════════════════════════════════════════════════════════════
const rr = path => db.ref('rooms/' + roomCode + (path ? '/' + path : ''));
const arr = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
const shuffle = a => {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = 0 | Math.random() * (i + 1);
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
};
const isCzar  = (r = room) => r?.order && arr(r.order)[r.czarIdx] === MY_ID;
const isHost  = (r = room) => r?.order && arr(r.order)[0] === MY_ID;
const czarId  = (r = room) => r?.order && arr(r.order)[r.czarIdx];
const czarName = (r = room) => r?.players?.[czarId(r)]?.name || '?';
const nonCzarIds = (r = room) => arr(r?.order || []).filter((_, i) => i !== r.czarIdx);
const genCode = () => {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return [0,1,2,3].map(() => c[0 | Math.random() * c.length]).join('');
};

async function createRoom() {
  const name = document.getElementById('nameInput')?.value?.trim();
  if (!name) { showErr('Adınızı girin!'); return; }
  myName = name;
  sessionStorage.setItem('pm_name', name);

  const code = genCode();
  roomCode = code;
  sessionStorage.setItem('pm_room', code);

  await db.ref('rooms/' + code).set({
    state: 'waiting',
    players: { [MY_ID]: { name, score: 0 } },
    order: [MY_ID],
    czarIdx: 0,
    round: 1,
    createdAt: Date.now(),
  });
  listenRoom();
}


async function soloTest() {
  const name = (document.getElementById('nameInput')?.value?.trim()) || 'Testçi';
  myName = name;
  sessionStorage.setItem('pm_name', name);

  const code = genCode();
  roomCode = code;
  sessionStorage.setItem('pm_room', code);

  const BOT = 'bot_czar';
  const blackCard = BLACK_CARDS[0 | Math.random() * BLACK_CARDS.length];
  const hand = dealHands(blackCard, [MY_ID])[MY_ID];

  await db.ref('rooms/' + code).set({
    state: 'playing',
    players: {
      [BOT]:  { name: '🤖 Bot Yargıç', score: 0 },
      [MY_ID]: { name, score: 0 },
    },
    order: [BOT, MY_ID],
    czarIdx: 0,
    round: 1,
    createdAt: Date.now(),
    hands: { [MY_ID]: hand },
    blackCard,
    played: null, revealed: null,
    revealLock: null, roundLock: null,
    winner: null, winnerName: null,
    usedBlacks: [blackCard.id],
    soloMode: true,
  });
  listenRoom();
}


// Her tura özel el dağıtımı
function dealHands(blackCard, playerIds) {
  const pool = (blackCard.responses && blackCard.responses.length >= 3)
    ? blackCard.responses
    : WHITE_CARDS;
  const hands = {};
  playerIds.forEach(pid => {
    hands[pid] = shuffle([...pool]).slice(0, 3);
  });
  return hands;
}

async function joinRoom() {
  const name = document.getElementById('nameInput')?.value?.trim();
  const code = (document.getElementById('codeInput')?.value || '').trim().toUpperCase();
  if (!name) { showErr('Adınızı girin!'); return; }
  if (code.length !== 4) { showErr('4 harfli oda kodunu girin!'); return; }

  myName = name;
  roomCode = code;
  sessionStorage.setItem('pm_name', name);
  sessionStorage.setItem('pm_room', code);

  const snap = await db.ref('rooms/' + code).once('value');
  if (!snap.exists()) { showErr('Oda bulunamadı! Kodu kontrol et.'); roomCode=''; return; }

  const r = snap.val();
  if (r.state !== 'waiting') { showErr('Oyun zaten başlamış!'); roomCode=''; return; }
  const playerCount = Object.keys(r.players || {}).length;
  if (playerCount >= 4) { showErr('Oda dolu (max 4 kişi)!'); roomCode=''; return; }

  const newOrder = [...arr(r.order), MY_ID];
  await db.ref('rooms/' + code).update({
    ['players/' + MY_ID]: { name, score: 0 },
    order: newOrder,
  });
  listenRoom();
}

async function startGame() {
  const r = room;
  const pids = arr(r.order);
  const blackCard = shuffle([...BLACK_CARDS])[0];
  const hands = dealHands(blackCard, pids);

  await rr().update({
    state: 'playing',
    hands,
    blackCard,
    played: null,
    revealed: null,
    revealLock: null,
    roundLock: null,
    winner: null,
    winnerName: null,
    round: 1,
    usedBlacks: [blackCard.id],
  });
}

async function submitCard(cardId) {
  const r = room;
  if (isCzar(r)) return;
  if (r.played?.[MY_ID]) return;

  const hand = arr(r.hands?.[MY_ID]);
  const card = hand.find(c => c.id === cardId);
  if (!card) return;

  // Replace card in hand
  const newHand = hand.filter(c => c.id !== cardId);
  await rr().update({
    ['played/' + MY_ID]: card,
    ['hands/' + MY_ID]: newHand,
  });
}

async function revealAll() {
  // revealLock: tek bir client'ın açıklamayı yapmasını garanti eder
  await rr('revealLock').transaction(v => {
    if (v !== null && v !== undefined) return; // abort — başkası yaptı
    return Date.now();
  }, async (err, committed) => {
    if (!committed || err) return;

    const r = room;
    const ncs = nonCzarIds(r);
    const entries = ncs.map(pid => ({ card: r.played[pid], playerId: pid }));
    const shuffled = shuffle(entries);
    const revObj = {};
    shuffled.forEach((e, i) => { revObj[i] = e; });

    await rr().update({ revealed: revObj, state: 'judging' });
  });
}

async function pickWinner(idx) {
  const r = room;
  if (!isCzar(r)) return;
  const revealed = r.revealed;
  const entry = revealed[idx];
  if (!entry) return;

  const winnerId = entry.playerId;
  const wName = r.players?.[winnerId]?.name || '?';
  const newScore = (r.players?.[winnerId]?.score || 0) + 1;
  const MAX = r.soloMode ? BLACK_CARDS.length + 1 : 5; // solo modda tüm kartlar gösterilir

  await rr().update({
    winner: winnerId,
    winnerName: wName,
    ['players/' + winnerId + '/score']: newScore,
    state: newScore >= MAX ? 'over' : 'result',
  });
}

async function nextRound() {
  // roundLock: tek bir client'ın tura geçmesini garanti eder
  await rr('roundLock').transaction(v => {
    if (v !== null && v !== undefined) return; // abort
    return Date.now();
  }, async (err, committed) => {
    if (!committed || err) return;

    const r = room;
    const order = arr(r.order);
    const nextIdx = r.soloMode ? 0 : (r.czarIdx + 1) % order.length;
    const used = arr(r.usedBlacks).filter(Boolean);
    const available = BLACK_CARDS.filter(c => !used.includes(c.id));
    const pool = available.length ? available : BLACK_CARDS;
    const blackCard = pool[0 | Math.random() * pool.length];

    const newHands = dealHands(blackCard, order);
    await rr().update({
      state: 'playing',
      czarIdx: nextIdx,
      round: (r.round || 1) + 1,
      blackCard,
      hands: newHands,
      played: null,
      revealed: null,
      revealLock: null,
      roundLock: null,
      winner: null,
      winnerName: null,
      usedBlacks: [...used, blackCard.id],
    });
  });
}

function leaveRoom() {
  if (roomRef) { roomRef.off(); roomRef = null; }
  sessionStorage.removeItem('pm_room');
  roomCode = '';
  room = null;
  render();
}

// ════════════════════════════════════════════════════════════
//  FIREBASE LİSTENER
// ════════════════════════════════════════════════════════════
function listenRoom() {
  if (roomRef) roomRef.off();
  roomRef = db.ref('rooms/' + roomCode);
  roomRef.on('value', snap => {
    const data = snap.val();
    if (!data) { leaveRoom(); return; }

    // Firebase array normalizasyonu
    if (data.order && !Array.isArray(data.order)) data.order = Object.values(data.order);
    if (data.usedBlacks && !Array.isArray(data.usedBlacks)) data.usedBlacks = Object.values(data.usedBlacks);

    room = data;
    render();

    // Tüm oyuncular kart oynadıysa → açıklama aşamasına geç
    if (room.state === 'playing' && !room.revealLock) {
      const ncs = nonCzarIds(room);
      const allIn = ncs.length > 0 && ncs.every(pid => room.played?.[pid]);
      if (allIn) revealAll();
    }

    // Solo mod: bot yargıç otomatik kazananı seçer
    if (room.state === 'judging' && room.soloMode && czarId(room) === 'bot_czar') {
      setTimeout(async () => {
        const snap = await db.ref('rooms/' + roomCode).once('value');
        const r = snap.val();
        if (r?.state !== 'judging') return;
        const revealed = r.revealed ? Object.values(r.revealed) : [];
        if (!revealed.length) return;
        const idx = 0 | Math.random() * revealed.length;
        const winnerId = revealed[idx].playerId;
        const wName = r.players?.[winnerId]?.name || '?';
        const newScore = (r.players?.[winnerId]?.score || 0) + 1;
        await db.ref('rooms/' + roomCode).update({
          winner: winnerId, winnerName: wName,
          ['players/' + winnerId + '/score']: newScore,
          state: newScore >= (r.soloMode ? BLACK_CARDS.length + 1 : 5) ? 'over' : 'result',
        });
      }, 1200);
    }
  });
}

// ════════════════════════════════════════════════════════════
//  RENDER — innerHTML tabanlı basit engine
// ════════════════════════════════════════════════════════════
function render() {
  document.getElementById('app').innerHTML = getScreen();
}

function getScreen() {
  if (!room || !roomCode) return lobbyHTML();
  switch (room.state) {
    case 'waiting':  return waitingHTML();
    case 'playing':  return playingHTML();
    case 'judging':  return judgingHTML();
    case 'result':   return resultHTML();
    case 'over':     return overHTML();
    default: return lobbyHTML();
  }
}

// ── LOBI ──
function lobbyHTML() {
  return `
    <div class="logo">POST<span>MODERN</span><br>MEMEler</div>
    <p class="tagline">Mimari Karikatür Kart Oyunu</p>
    <div class="panel">
      <input id="nameInput" class="inp" placeholder="Adınız..." value="${myName}" maxlength="16"
        onkeydown="if(event.key==='Enter')document.getElementById('codeInput')?.focus()">
      <button class="btn red" onclick="createRoom()">＋ ODA OLUŞTUR</button>
      <div class="or">— veya var olan odaya katıl —</div>
      <input id="codeInput" class="inp code-inp" placeholder="ABCD" maxlength="4"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')joinRoom()">
      <button class="btn dark" onclick="joinRoom()">→ ODAYA KATIL</button>
      <div id="errMsg" class="err"></div>
    </div>
    <button class="btn" style="background:#f0ebe0;border-style:dashed" onclick="soloTest()">🧪 TEK BAŞINA DENE</button>
    <div class="foot">2–4 oyuncu · İlk 5 puan kazanır · Firebase Realtime</div>
  `;
}

// ── BEKLİYORUZ ──
function waitingHTML() {
  const r = room;
  const players = Object.entries(r.players || {});
  const canStart = players.length >= 2;

  return `
    <div class="code-box">
      <div class="code-lbl">ODA KODU</div>
      <div class="code-val">${roomCode}</div>
      <div class="code-hint">Arkadaşlarına gönder 👆</div>
    </div>

    <div class="panel">
      <div class="sec-lbl">OYUNCULAR (${players.length}/4)</div>
      ${players.map(([pid, p]) => `
        <div class="player-row${pid === MY_ID ? ' me' : ''}">
          <div class="dot${pid === MY_ID ? ' mine' : ''}"></div>
          <span>${p.name}${pid === arr(r.order)[0] ? ' 👑' : ''}</span>
          ${pid === MY_ID ? '<span class="me-tag">(sen)</span>' : ''}
        </div>
      `).join('')}
    </div>

    ${isHost(r) ? `
      <button class="btn red" ${canStart ? '' : 'disabled'} onclick="startGame()">
        ${canStart ? '▶ OYUNU BAŞLAT' : 'En az 2 oyuncu gerekli'}
      </button>
    ` : `
      <div class="wait-msg" style="margin-top:8px">
        ⏳ Host oyunu başlatmasını bekle...
      </div>
    `}

    <button class="btn sm dark" onclick="leaveRoom()">← Çık</button>
  `;
}

// ── OYNUYORUZ ──
function playingHTML() {
  const r = room;
  const myHand = arr(r.hands?.[MY_ID]);
  const myPlayed = r.played?.[MY_ID];
  const ncs = nonCzarIds(r);
  const subCount = ncs.filter(pid => r.played?.[pid]).length;

  return `
    ${headerHTML(r)}
    ${blackCardHTML(r.blackCard)}

    ${isCzar(r) ? `
      <div class="panel">
        <div class="sec-lbl">⚖️ YARGIÇ SENSİN — Oyuncular seçiyor</div>
        <div class="wait-msg">${subCount} / ${ncs.length} oyuncu kart oynadı</div>
        <div class="prog"><div class="prog-fill" style="width:${ncs.length ? subCount / ncs.length * 100 : 0}%"></div></div>
      </div>
    ` : myPlayed ? `
      <div class="panel">
        <div class="sec-lbl">OYNADINIZ ✓</div>
        ${whiteCardHTML(myPlayed, false)}
        <div class="wait-msg">Yargıç değerlendiriyor...</div>
      </div>
    ` : `
      <div class="sec-lbl">ELİNİZDEKİ KARTLAR — birine dokun</div>
      <div class="hand">${myHand.map(c => whiteCardHTML(c, true)).join('')}</div>
    `}

    ${scoresHTML(r)}
  `;
}

// ── YARGILIYORUZ ──
function judgingHTML() {
  const r = room;
  const revealed = r.revealed ? Object.values(r.revealed) : [];

  return `
    ${headerHTML(r)}
    ${blackCardHTML(r.blackCard)}

    ${isCzar(r) ? `
      <div class="sec-lbl">⚖️ EN İYİ KARTI SEÇ — dokun</div>
      <div class="hand">
        ${revealed.map((e, i) => whiteCardHTML(e.card, true, i)).join('')}
      </div>
    ` : `
      <div class="panel">
        <div class="sec-lbl">YARGIÇ DEĞERLENDİRİYOR</div>
        <div class="wait-msg">⚖️ <strong>${czarName(r)}</strong> en iyi kartı seçiyor...</div>
        <div class="emoji-row">${revealed.map(e => `<span>${e.card.emoji}</span>`).join('')}</div>
      </div>
    `}

    ${scoresHTML(r)}
  `;
}

// ── SONUÇ ──
function resultHTML() {
  const r = room;
  const revealed = r.revealed ? Object.values(r.revealed) : [];
  const winEntry = revealed.find(e => e.playerId === r.winner);

  return `
    <div class="result-banner">🏆 ${r.winnerName || '?'} KAZANDI!</div>
    ${winEntry ? whiteCardHTML(winEntry.card, false) : ''}
    ${blackCardHTML(r.blackCard)}
    ${scoresHTML(r)}
    <button class="btn dark" onclick="nextRound()">Sonraki Tur →</button>
  `;
}

// ── OYUN BİTTİ ──
function overHTML() {
  const r = room;
  const sorted = Object.entries(r.players || {}).sort((a, b) => b[1].score - a[1].score);
  const medals = ['🥇','🥈','🥉','4️⃣'];

  return `
    <div class="logo" style="font-size:30px">OYUN BİTTİ</div>
    <div class="panel">
      ${sorted.map(([pid, p], i) => `
        <div class="player-row${pid === MY_ID ? ' me' : ''}">
          <span style="font-size:22px">${medals[i] || ''}</span>
          <strong>${p.name}</strong>
          <span class="pts">${p.score} puan</span>
        </div>
      `).join('')}
    </div>
    <button class="btn red" onclick="leaveRoom()">Ana Menüye Dön</button>
  `;
}

// ── PARÇALAR ──
function headerHTML(r) {
  return `
    <div class="hdr">
      <span class="round-tag">TUR ${r.round || 1}</span>
      <span class="czar-tag">⚖️ ${czarName(r)}</span>
    </div>
  `;
}

function blackCardHTML(card) {
  if (!card) return '';
  if (card.img) {
    return `
      <div class="black-card img-prompt" style="background:${card.color}">
        <div class="bc-year">${card.year}</div>
        <div class="bc-img-frame">
          <img class="bc-img" src="${card.img}" alt="${card.title}"
               onerror="this.style.background='#333';this.alt='⚠️ Görsel yok'">
        </div>
        ${card.title ? `<div class="bc-label">${card.title}</div>` : ''}
      </div>
    `;
  }
  return `
    <div class="black-card" style="background:${card.color}">
      <div class="bc-year">${card.year}</div>
      <div class="bc-emoji">${card.emoji}</div>
      <div class="bc-title">${card.title}</div>
      <div class="bc-prompt">${card.prompt}</div>
    </div>
  `;
}

function whiteCardHTML(card, clickable, pickIdx) {
  const top = card.img
    ? `<div class="img-frame"><img class="c-img" src="${card.img}" onerror="this.style.cssText='width:100%;height:80px;background:#fee;border:1px dashed #c00'"></div>`
    : (card.emoji ? `<div class="c-emoji">${card.emoji}</div>` : '');
  return `
    <div class="white-card${clickable ? ' clickable' : ''}${card.img ? ' has-img' : ''}"
         style="background:${card.color}"
         ${clickable ? (pickIdx !== undefined ? `onclick="pickWinner(${pickIdx})"` : `onclick="submitCard('${card.id}')"`) : ''}>
      ${top}
      <div class="c-text">${card.text}</div>
      ${pickIdx !== undefined ? '<div class="pick-hint">SEÇ →</div>' : ''}
    </div>
  `;
}

function scoresHTML(r) {
  const order = arr(r.order);
  return `
    <div class="scores">
      ${order.map(pid => `
        <div class="score-chip${pid === MY_ID ? ' me' : ''}${pid === czarId(r) ? ' czar' : ''}">
          ${pid === czarId(r) ? '<div class="sc-czar">⚖️</div>' : ''}
          <div class="sc-name">${(r.players?.[pid]?.name || '?').slice(0, 7)}</div>
          <div class="sc-pts">${r.players?.[pid]?.score || 0}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  if (el) el.textContent = msg;
  else alert(msg);
}

// ════════════════════════════════════════════════════════════
//  BAŞLAT
// ════════════════════════════════════════════════════════════
if (roomCode) {
  // sessionStorage'da oda var — yeniden bağlan
  listenRoom();
} else {
  render();
}
</script>
</body>
</html>
